# Cloud Build → Cloud Run 배포 (asia-northeast3, 서울 리전)
#
# 트리거 옵션 1) GitHub 연결 후 자동 배포
# 트리거 옵션 2) 수동:
#   gcloud builds submit --config api/cloudbuild.yaml ./api
#
# 사전 작업:
#   gcloud secrets create emco-supabase-key --data-file=- < <(echo $SUPABASE_SERVICE_ROLE_KEY)
#   gcloud secrets create emco-gemini-key   --data-file=- < <(echo $GEMINI_API_KEY)
#   gcloud secrets create emco-ip-salt      --data-file=- < <(echo $IP_HASH_SALT)
#
substitutions:
  _SERVICE_NAME: emco-chatbot-api
  _REGION: asia-northeast3
  _IMAGE: asia-northeast3-docker.pkg.dev/$PROJECT_ID/cloudrun/emco-chatbot-api

steps:
  - name: gcr.io/cloud-builders/docker
    id: Build
    args: ['build', '-t', '${_IMAGE}:$COMMIT_SHA', '-t', '${_IMAGE}:latest', '.']

  - name: gcr.io/cloud-builders/docker
    id: Push
    args: ['push', '--all-tags', '${_IMAGE}']

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: Deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_IMAGE}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --concurrency=40
      - --timeout=120s
      - --set-env-vars=NODE_ENV=production,SUPABASE_URL=https://wltqkxesvtfwotcngzjj.supabase.co,GEMINI_MODEL=gemini-2.0-flash,GEMINI_EMBEDDING_MODEL=gemini-embedding-001,CORS_ORIGIN=https://emco-8a3b5.web.app,https://emco-8a3b5.firebaseapp.com
      - --set-secrets=SUPABASE_SERVICE_ROLE_KEY=emco-supabase-key:latest,GEMINI_API_KEY=emco-gemini-key:latest,IP_HASH_SALT=emco-ip-salt:latest

images:
  - '${_IMAGE}:$COMMIT_SHA'
  - '${_IMAGE}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
